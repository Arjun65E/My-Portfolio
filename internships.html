<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:#f0f4f8;color:#2d3748;line-height:1.6;padding:20px;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.container{max-width:1000px;margin:0 auto;background:#fff;padding:40px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.06);animation:fadeInUp .7s ease-out;}
nav{display:flex;gap:12px;justify-content:flex-end;margin-bottom:30px;flex-wrap:wrap;}
nav a{font-size:.85rem;font-weight:600;color:#0077b5;text-decoration:none;padding:6px 16px;border:1.5px solid #0077b5;border-radius:20px;transition:all .2s;}
nav a:hover,nav a.active{background:#0077b5;color:#fff;}
.page-title{margin-bottom:32px;}
.breadcrumb{font-size:.82rem;color:#a0aec0;margin-bottom:8px;}
.breadcrumb a{color:#0077b5;text-decoration:none;}
.breadcrumb a:hover{text-decoration:underline;}
h1{font-size:2rem;color:#1a202c;}
/* Internship card */
.intern-card{display:flex;align-items:center;justify-content:space-between;gap:18px;border:1.5px solid #e2e8f0;border-radius:14px;padding:28px 30px;text-decoration:none;color:inherit;transition:all .3s;margin-bottom:16px;background:#fff;}
.intern-card:hover{border-color:#90cdf4;box-shadow:0 8px 20px rgba(0,0,0,.08);transform:translateY(-3px);}
.intern-left{display:flex;align-items:center;gap:20px;}
.intern-logo{width:60px;height:60px;border-radius:12px;background:linear-gradient(135deg,#1a365d,#2b6cb0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1rem;letter-spacing:.02em;flex-shrink:0;}
.intern-badge{display:inline-block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 10px;border-radius:20px;background:#dbeafe;color:#1e40af;margin-bottom:6px;}
.intern-card h2{font-size:1.2rem;font-weight:700;color:#1a202c;margin-bottom:4px;}
.intern-card .meta{font-size:.88rem;color:#718096;}
.intern-card .period{font-size:.82rem;font-weight:600;color:#38a169;margin-top:4px;}
.arrow{font-size:1.6rem;color:#0077b5;flex-shrink:0;}
.footer-strip{margin-top:50px;border-top:1px solid #e2e8f0;padding-top:24px;text-align:center;font-size:.88rem;color:#718096;}
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="index.html">Home</a>
    <a href="internships.html" class="active">Internships</a>
  </nav>

  <div class="page-title">
    <div class="breadcrumb"><a href="index.html">Home</a> › Internships</div>
    <h1>Internship Experience</h1>
  </div>

  <a href="amns.html" class="intern-card">
    <div class="intern-left">
      <div class="intern-logo">AM/NS</div>
      <div>
        <span class="intern-badge">Information Technology</span>
        <h2>ArcelorMittal Nippon Steel India</h2>
        <div class="meta">AM/NS India · Hazira Plant, Surat</div>
        <div class="period">📅 1st June 2026 – 30th June 2026</div>
      </div>
    </div>
    <span class="arrow">›</span>
  </a>

  <div class="footer-strip">Designed &amp; Built in <strong style="color:#0077b5;">India</strong> &nbsp;🇮🇳</div>
</div>
